services:
  db:
    image: postgres:16
    container_name: prova_db_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: senha_secreta_dev
      POSTGRES_DB: ecom_dev
    ports:
      - "5432:5432"
    volumes:
      - dados_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16
    container_name: prova_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: senha_secreta_test
      POSTGRES_DB: ecom_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dados_dev:
